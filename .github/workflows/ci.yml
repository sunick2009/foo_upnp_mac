# CI per ADR-013: the macOS job is the gate proving the component build
# path (ObjC++ bundle + foobar2000 SDK under CMake, no .xcodeproj) stays
# green. The Linux job mirrors .gitlab-ci.yml for the portable core.
# The foobar2000 SDK is downloaded at build time — never committed.

name: ci

on:
  push:
    branches: [main]
  pull_request:

env:
  FB2K_SDK_ARCHIVE: SDK-2025-03-07.7z

jobs:
  macos:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Cache foobar2000 SDK
        id: sdk-cache
        uses: actions/cache@v4
        with:
          path: third_party/fb2k_sdk
          key: fb2k-sdk-${{ env.FB2K_SDK_ARCHIVE }}

      - name: Fetch foobar2000 SDK
        if: steps.sdk-cache.outputs.cache-hit != 'true'
        run: |
          mkdir -p third_party/fb2k_sdk
          cd third_party/fb2k_sdk
          curl -sSLO "https://www.foobar2000.org/downloads/${FB2K_SDK_ARCHIVE}"
          tar -xf "${FB2K_SDK_ARCHIVE}"

      # Release build: this job's artifact is the beta release candidate
      # (issue #8), not just a compile gate.
      - name: Configure
        run: >
          cmake -B build -DCMAKE_BUILD_TYPE=Release
          -DENABLE_MACOS_BUNDLE_SMOKE_TEST=ON
          -DENABLE_FB2K_SDK_CHECK=ON
          -DENABLE_FB2K_COMPONENT=ON

      - name: Build
        run: cmake --build build -j 3

      - name: Test
        run: ctest --test-dir build --output-on-failure

      - name: Ad-hoc codesign component bundles
        run: |
          for bundle in foo_dms_sdk_check foo_dms_browser; do
            codesign -s - -f "build/component_macos/${bundle}.component"
            codesign -dv "build/component_macos/${bundle}.component"
          done

      # Fail fast if the bundle would not load in foobar2000: structure,
      # entry point, architecture, and a strict signature check (issue #7).
      - name: Component artifact smoke check
        run: |
          BUNDLE=build/component_macos/foo_dms_browser.component
          BIN="$BUNDLE/Contents/MacOS/foo_dms_browser"
          test -f "$BUNDLE/Contents/Info.plist" || { echo "missing Info.plist"; exit 1; }
          test -x "$BIN" || { echo "missing executable"; exit 1; }
          plutil -lint "$BUNDLE/Contents/Info.plist"
          file "$BIN" | grep -q "arm64" || { echo "not arm64"; file "$BIN"; exit 1; }
          nm -gU "$BIN" | grep -q "_foobar2000_get_interface" \
            || { echo "entry point _foobar2000_get_interface not exported"; exit 1; }
          codesign --verify --deep --strict "$BUNDLE"
          echo "smoke check OK: $(file -b "$BIN")"

      # .fb2k-component layout: the bundle must sit under a top-level
      # mac/ directory or foobar2000's Install… rejects it as
      # "Unsupported format" (verified against working third-party mac
      # components, 2026-07-18). Versioned filename + SHA-256 (issue #8).
      - name: Package .fb2k-component
        run: |
          VERSION=$(awk -F'"' '/^ *"[0-9]/{print $2; exit}' \
            component_macos/foo_dms_browser/ComponentEntry.mm)
          PKG="foo_dms_browser-${VERSION}-arm64.fb2k-component"
          cd build/component_macos
          rm -rf pkgroot && mkdir -p pkgroot/mac
          cp -R foo_dms_browser.component pkgroot/mac/
          (cd pkgroot && ditto -c -k . "../$PKG")
          shasum -a 256 "$PKG" | tee "$PKG.sha256"

      - name: Upload component artifact
        uses: actions/upload-artifact@v4
        with:
          name: foo_dms_browser-fb2k-component
          path: |
            build/component_macos/foo_dms_browser-*.fb2k-component
            build/component_macos/foo_dms_browser-*.fb2k-component.sha256

  linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq cmake libcurl4-openssl-dev python3

      - name: Configure
        run: cmake -B build -DCMAKE_BUILD_TYPE=Debug

      - name: Build
        run: cmake --build build -j "$(nproc)"

      - name: Test
        run: ctest --test-dir build --output-on-failure
